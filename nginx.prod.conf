log_format poisker_safe '$remote_addr - [$time_local] '
                        '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                        '"$http_user_agent"';

upstream flask_app {
    server web:8000;
}

server {
    listen 80;
    server_name poisker.ru www.poisker.ru;
    server_tokens off;
    access_log /var/log/nginx/access.log poisker_safe;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        access_log off;
    }

    location /ready {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        access_log off;
    }

    location /static/ {
        alias /app/app/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        return 301 https://poisker.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.poisker.ru;
    server_tokens off;
    access_log /var/log/nginx/access.log poisker_safe;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/poisker.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poisker.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://poisker.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name poisker.ru;
    server_tokens off;
    access_log /var/log/nginx/access.log poisker_safe;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/poisker.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poisker.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /static/ {
        alias /app/app/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
