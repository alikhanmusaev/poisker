{% extends "base.html" %}
{% block title %}Жалоба — {{ site_name }}{% endblock %}
{% block content %}
<div class="page-card">
  <a href="{{ back_url }}" class="back-link">
    <i data-lucide="arrow-left" class="icon icon-sm" aria-hidden="true"></i>
    Назад к объявлению
  </a>
  <h1 class="page-title">Пожаловаться</h1>
  <p>Объявление: {{ post.title }}</p>
  <form method="post" class="form">
    {{ form.hidden_tag() }}
    <label>{{ form.reason.label }}{{ form.reason(class="input") }}</label>
    <label>{{ form.comment.label }}{{ form.comment(class="input textarea", rows=3) }}</label>
    {% include "partials/captcha_widget.html" %}
    <button type="submit" class="btn btn-primary">Отправить</button>
  </form>
</div>
{% endblock %}
