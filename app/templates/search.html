{% extends "base.html" %}
{% block title %}Поиск — {{ site_name }}{% endblock %}
{% block content %}
<section class="search-section">
  <form method="get" action="{{ url_for('main.index') }}" class="search-form"
        hx-get="{{ url_for('main.index') }}" hx-target="#feed-panel" hx-push-url="true" hx-trigger="submit">
    <div class="search-input-wrap">
      <input type="search" name="q" value="{{ query }}" placeholder="Что ищете?" autocomplete="off"
             hx-get="{{ url_for('main.suggest_view') }}" hx-trigger="keyup changed delay:300ms"
             hx-target="#suggest-box" hx-swap="innerHTML">
      <div id="suggest-box"></div>
    </div>
    <div class="search-filters">
      <select name="category">
        <option value="">Все категории</option>
        {% for slug, (label, icon) in categories.items() %}
          <option value="{{ slug }}" {% if category == slug %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
      <input type="number" name="price_min" placeholder="Цена от" value="{{ price_min or '' }}" min="0">
      <input type="number" name="price_max" placeholder="Цена до" value="{{ price_max or '' }}" min="0">
    </div>
    <button type="submit" class="btn btn-primary">Найти</button>
  </form>
</section>

<div id="feed-panel">
  {% include "partials/search_results.html" %}
</div>
{% endblock %}
