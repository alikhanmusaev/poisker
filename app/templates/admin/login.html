{% extends "admin/layout.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="admin-login-card">
  <h1>Вход в админ-панель</h1>
  <form method="post">
    {{ form.hidden_tag() }}
    <label>{{ form.username.label.text }}
      {{ form.username(class_='admin-input') }}
    </label>
    <label>{{ form.password.label.text }}
      {{ form.password(class_='admin-input') }}
    </label>
    <button type="submit" class="admin-btn admin-btn--primary">Войти</button>
  </form>
</div>
{% endblock %}
