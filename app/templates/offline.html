{% extends "base.html" %}
{% block title %}Нет сети{% endblock %}
{% block content %}
<div class="empty-state" role="alert">
  <i data-lucide="wifi-off" class="icon icon-xl" aria-hidden="true"></i>
  <h1>Нет подключения к интернету</h1>
  <p>Проверьте Wi‑Fi или мобильную сеть и попробуйте снова. Кэшированные страницы могут открываться без сети.</p>
  <button type="button" data-reload-page class="btn btn-primary">Обновить</button>
  <p class="empty-state-hint"><a href="{{ url_for('main.index') }}">Вернуться на главную</a></p>
</div>
{% endblock %}
