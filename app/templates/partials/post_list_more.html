<div class="post-grid-append" hx-swap-oob="beforeend:#post-grid">
  {% for item in results %}
    {% set post = item.post %}
    {% set highlight = item.highlight %}
    {% include "partials/post_card.html" %}
  {% endfor %}
</div>
{% if has_next %}
  <div class="load-more"
       hx-get="{{ url_for('main.index', page=page + 1, q=query, category=category, price_min=price_min, price_max=price_max, sort=sort) }}"
       hx-trigger="revealed" hx-swap="outerHTML">
    <i data-lucide="loader-circle" class="icon icon-sm" aria-hidden="true"></i>
    <span>Загрузка...</span>
  </div>
{% endif %}
