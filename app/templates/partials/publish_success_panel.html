<div class="publish-success"
     {% if edit_url is defined and edit_url %}data-edit-url="{{ edit_url }}"{% endif %}
     {% if post_id is defined and post_id %}data-post-id="{{ post_id }}"{% endif %}
     {% if title is defined and title %}data-post-title="{{ title }}"{% endif %}
     {% if view_url is defined and view_url %}data-view-url="{{ view_url }}"{% endif %}>
  <p class="publish-success-badge">
    <i data-lucide="check" class="icon icon-sm" aria-hidden="true"></i>
    <span>Опубликовано</span>
  </p>
  <h2 class="publish-success-title">Сохраните ссылку</h2>
  <p class="publish-success-note">Профиля нет — сохраните ссылку в заметки или отправьте себе</p>

  <div class="publish-success-actions">
    <button type="button" class="btn btn-primary btn-block publish-success-copy" id="copy-edit-btn">
      <i data-lucide="copy" class="icon" aria-hidden="true"></i>
      <span>Скопировать</span>
    </button>
    <button type="button" class="btn btn-secondary btn-block publish-success-share" id="share-edit-btn">
      <i data-lucide="share-2" class="icon" aria-hidden="true"></i>
      <span>Поделиться</span>
    </button>
  </div>

  <p class="publish-success-feedback" id="edit-url-hint" hidden role="status"></p>
  <p class="publish-success-saved" id="autosave-msg" hidden>Добавлено в «Мои»</p>

  <div class="publish-success-links">
    <a href="{{ view_url if view_url is defined else '#' }}"
       class="btn btn-secondary publish-success-view is-disabled"
       id="open-post-btn"
       {% if not view_url %}aria-disabled="true" tabindex="-1"{% endif %}>Открыть объявление</a>
    <a href="{{ url_for('posts.my_posts') }}" class="btn btn-secondary publish-success-my">Мои объявления</a>
  </div>
</div>
