{% if items %}
<ul class="suggest-list" role="listbox">
  {% for item in items %}
    <li>
      <button type="button" class="suggest-item" role="option" data-suggest-value="{{ item }}">
        <i data-lucide="search" class="icon icon-xs" aria-hidden="true"></i>
        <span>{{ item }}</span>
      </button>
    </li>
  {% endfor %}
</ul>
{% endif %}
