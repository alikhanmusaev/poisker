log_format poisker_safe '$remote_addr - [$time_local] '
                        '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                        '"$http_user_agent"';

server {
    listen 80;
    server_name _;
    server_tokens off;
    access_log /var/log/nginx/access.log poisker_safe;
    client_max_body_size 10M;
    # Podman DNS (127.0.0.11 is Docker-only and adds ~5s timeouts on Fedora Podman)
    resolver 10.89.0.1 valid=30s ipv6=off;

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location / {
        set $backend web:8000;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
    }
}
