name: app
description: Poisker Flutter client (API)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  go_router: ^15.1.2
  provider: ^6.1.5
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.1
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.6
  flutter_local_notifications: ^19.2.1
  url_launcher: ^6.3.1
  image_picker: ^1.2.3
  path: ^1.9.1
  http_parser: ^4.1.2
  google_fonts: ^8.2.0
  lucide_icons_flutter: ^3.1.15
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/logo.png
