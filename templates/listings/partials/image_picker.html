<div
  class="image-picker"
  data-total-max="5"
  data-max-bytes="5242880"
  data-existing-count="{{ existing_count|default:0 }}"
>
  <div class="image-picker-control">
    <button type="button" class="btn btn-secondary image-picker-add">
      <i data-lucide="image-plus" class="icon" aria-hidden="true"></i>
      <span class="image-picker-button-label">Добавить фото</span>
    </button>
    <p class="image-picker-status">Фото не выбраны</p>
    <input
      type="file"
      name="images"
      id="id_images"
      class="image-picker-input sr-only"
      accept="image/jpeg,image/png,image/webp"
      multiple
    >
  </div>
  <p class="image-picker-error" hidden role="alert"></p>
  <div class="image-picker-preview" hidden></div>
  <input type="hidden" name="cover_index" id="cover-index-field" value="{{ cover_index|default:0 }}">
  <p class="field-help">До 5 фото · JPG, PNG или WebP · до 5 МБ. Можно выбрать несколько сразу или по одному. Нажмите на новое фото, чтобы сделать его обложкой.</p>
</div>
