{% extends "base.html" %}
{% block title %}Ошибка безопасности — {{ site_name }}{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="page-card auth-card">
    <div class="auth-card-header">
      <i data-lucide="shield-alert" class="icon auth-card-icon" aria-hidden="true"></i>
      <h1 class="page-title">Сессия устарела</h1>
      <p class="page-lead">Обновите страницу и попробуйте снова. Если вы уже вошли — откройте профиль.</p>
    </div>
    <div class="auth-footer">
      <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-block">Войти</a>
      <p class="auth-switch"><a href="{% url 'core:index' %}">На главную</a></p>
    </div>
  </div>
</div>
{% endblock %}
