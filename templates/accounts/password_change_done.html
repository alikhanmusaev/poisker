{% extends "base.html" %}
{% block title %}Пароль изменён — {{ site_name }}{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="page-card auth-card auth-card-status">
    <div class="auth-card-header">
      <i data-lucide="check-circle" class="icon auth-card-icon auth-card-icon-success" aria-hidden="true"></i>
      <h1 class="page-title">Пароль изменён</h1>
      <p class="page-lead">Новый пароль сохранён.</p>
    </div>
    <div class="auth-footer">
      <a href="{% url 'accounts:profile' %}" class="btn btn-primary btn-block">В профиль</a>
    </div>
  </div>
</div>
{% endblock %}
