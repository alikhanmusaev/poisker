services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-board}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chechnya_board}

  typesense:
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:?set TYPESENSE_API_KEY}
      TYPESENSE_ENABLE_CORS: "false"

  minio:
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}

  web:
    ports: !reset []
    volumes:
      - ./staticfiles:/app/staticfiles
    environment:
      DJANGO_DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      HMAC_SECRET: ${HMAC_SECRET:?set HMAC_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@poisker.ru}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      ADMIN_PHONE: ${ADMIN_PHONE:-+79000000001}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-board}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chechnya_board}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:?set TYPESENSE_API_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:?set S3_PUBLIC_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      SESSION_COOKIE_SECURE: "true"
      TRUST_PROXY: "true"
      HSTS_ENABLED: "true"
      SECURE_SSL_REDIRECT: "false"
      RUN_DB_UPGRADE: ${RUN_DB_UPGRADE:-true}
      RUN_DB_INIT: "false"
      SEED_DEMO_DATA: "0"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      SCHEDULER_ENABLED: "false"
      NOTIFY_SELLER_EMAIL: ${NOTIFY_SELLER_EMAIL:-false}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-poisker.ru,www.poisker.ru}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://poisker.ru,https://www.poisker.ru}
      STATIC_VERSION: ${STATIC_VERSION:-django-31}

  scheduler:
    environment:
      DJANGO_DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      HMAC_SECRET: ${HMAC_SECRET:?set HMAC_SECRET}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-board}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chechnya_board}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:?set TYPESENSE_API_KEY}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      SCHEDULER_ENABLED: "true"
      SEED_DEMO_DATA: "0"

  nginx:
    profiles:
      - container-edge
    ports: !reset []
